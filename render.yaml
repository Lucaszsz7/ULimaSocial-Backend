databases:
  - name: ulimasocial-db
    databaseName: ulimasocial
    user: ulimasocial
    plan: free

services:
  - type: web
    name: ulimasocial-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:init
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ulimasocial-db
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

